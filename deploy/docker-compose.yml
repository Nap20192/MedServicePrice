# MedServicePrice stack. Copy deploy/.env.example to deploy/.env for local compose.
services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: msp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.goose
    container_name: msp_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro
    environment:
      GOOSE_DRIVER: ${GOOSE_DRIVER}
      GOOSE_DBSTRING: ${GOOSE_DBSTRING}
      GOOSE_MIGRATION_DIR: ${GOOSE_MIGRATION_DIR}
    command: ["up"]
    restart: "no"

  rabbitmq:
    build:
      context: .
      dockerfile: Dockerfile.rabbitmq
    container_name: msp_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: msp
      RABBITMQ_DEFAULT_PASS: msp
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions \"/etc/rabbitmq/definitions.json\""
    volumes:
      - ../queue/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: cmd/api/Dockerfile
    container_name: msp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: ${API_DATABASE_URL}
      RABBITMQ_URL: ${API_RABBITMQ_URL}
      HTTP_PORT: ${API_HTTP_PORT}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS}
      MIGRATIONS_DIR: ${MIGRATIONS_DIR}
    ports:
      - "${API_HTTP_PORT}:${API_HTTP_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- ${API_PUBLIC_URL}/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    profiles: ["app"]
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL}
    container_name: msp_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"

  # ai-crawler RabbitMQ worker (Python 3.13 — lxml has no 3.14 wheel).
  worker:
    profiles: ["docker-worker"]
    build:
      context: ..
      dockerfile: ai-crawler/Dockerfile
    container_name: msp_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      RABBITMQ_URL: ${WORKER_RABBITMQ_URL}
      DATABASE_URL: ${WORKER_DATABASE_URL}
      SINK: ${SINK}
      WORKER_PREFETCH: ${WORKER_PREFETCH}

volumes:
  pgdata:
