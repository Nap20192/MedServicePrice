# MedServicePrice stack. Copy deploy/.env.example to deploy/.env for local compose.
services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: msp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.goose
    container_name: msp_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro
    environment:
      GOOSE_DRIVER: ${GOOSE_DRIVER}
      GOOSE_DBSTRING: ${GOOSE_DBSTRING}
      GOOSE_MIGRATION_DIR: ${GOOSE_MIGRATION_DIR}
    command: ["up"]
    restart: "no"

  rabbitmq:
    build:
      context: .
      dockerfile: Dockerfile.rabbitmq
    container_name: msp_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: msp
      RABBITMQ_DEFAULT_PASS: msp
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions \"/etc/rabbitmq/definitions.json\""
    volumes:
      - ../queue/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: cmd/api/Dockerfile
    container_name: msp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: ${API_DATABASE_URL}
      RABBITMQ_URL: ${API_RABBITMQ_URL}
      HTTP_PORT: ${API_HTTP_PORT}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS}
      MIGRATIONS_DIR: ${MIGRATIONS_DIR}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      GOOGLE_PLACES_BASE_URL: ${GOOGLE_PLACES_BASE_URL}
    ports:
      - "${API_HTTP_PORT}:${API_HTTP_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- ${API_PUBLIC_URL}/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Normalize service: reads raw parsed_services, binds to the catalog, publishes
  # service_offers (gold). Sole reader of the raw layer; driven by q.parse.completed.
  normalize:
    build:
      context: ..
      dockerfile: cmd/normalize/Dockerfile
    container_name: msp_normalize
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: ${API_DATABASE_URL}
      RABBITMQ_URL: ${API_RABBITMQ_URL}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_MIN_CONFIDENCE: ${LLM_MIN_CONFIDENCE}
      LLM_TIMEOUT_S: ${LLM_TIMEOUT_S}
      NORMALIZE_SWEEP_INTERVAL_S: ${NORMALIZE_SWEEP_INTERVAL_S}
      NORMALIZE_SWEEP_LIMIT: ${NORMALIZE_SWEEP_LIMIT}
    # Reach the host's Ollama (http://host.docker.internal:11434) from the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL}
    container_name: msp_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:
